name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    name: byte-compile (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Byte-compile (syntax smoke test)
        run: python -m py_compile mdbrowser.py
